<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/LogoPestaña.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms CUN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('forms-cun-theme');
          var light = false;
          if (raw) {
            var j = JSON.parse(raw);
            if (j && j.state && j.state.theme === 'light') light = true;
          }
          if (light) document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
